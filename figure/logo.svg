<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">SCPInt logo</title>
  <desc id="desc">A refined horizontal-line wordmark for single-cell proteomics integration.</desc>
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.46" stop-color="#20313a"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b7580"/>
      <stop offset="0.5" stop-color="#b08d57"/>
      <stop offset="1" stop-color="#1b7580"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#101820" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="#ffffff"/>

  <g filter="url(#softShadow)">
    <rect x="92" y="80" width="1016" height="1.5" fill="#101820" opacity="0.76"/>
    <rect x="92" y="278" width="1016" height="1.5" fill="#101820" opacity="0.76"/>

    <g fill="url(#signal)" opacity="0.92">
      <rect x="92" y="100" width="84" height="4"/>
      <rect x="194" y="100" width="38" height="4"/>
      <rect x="250" y="100" width="126" height="4"/>
      <rect x="394" y="100" width="56" height="4"/>
      <rect x="468" y="100" width="188" height="4"/>
      <rect x="674" y="100" width="42" height="4"/>
      <rect x="734" y="100" width="152" height="4"/>
      <rect x="904" y="100" width="70" height="4"/>
      <rect x="992" y="100" width="116" height="4"/>

      <rect x="92" y="256" width="130" height="4"/>
      <rect x="240" y="256" width="54" height="4"/>
      <rect x="312" y="256" width="178" height="4"/>
      <rect x="508" y="256" width="46" height="4"/>
      <rect x="572" y="256" width="112" height="4"/>
      <rect x="702" y="256" width="78" height="4"/>
      <rect x="798" y="256" width="184" height="4"/>
      <rect x="1000" y="256" width="108" height="4"/>
    </g>

    <g fill="#101820" opacity="0.18">
      <rect x="92" y="118" width="1016" height="1"/>
      <rect x="92" y="132" width="1016" height="1"/>
      <rect x="92" y="226" width="1016" height="1"/>
      <rect x="92" y="240" width="1016" height="1"/>
    </g>

    <text x="600" y="204"
          text-anchor="middle"
          font-family="Aptos Display, Segoe UI, Helvetica Neue, Arial, sans-serif"
          font-size="94"
          font-weight="650"
          letter-spacing="10"
          fill="url(#ink)">SCPInt</text>

    <text x="600" y="236"
          text-anchor="middle"
          font-family="Aptos, Segoe UI, Helvetica Neue, Arial, sans-serif"
          font-size="19"
          font-weight="500"
          letter-spacing="6"
          fill="#52606a">SINGLE-CELL PROTEOMICS INTEGRATION</text>
  </g>
</svg>
